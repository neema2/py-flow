name: Build & Publish to PyPI

on:
  release:
    types: [published]

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java (required by Deephaven)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,client,dev]"

      - name: Start Deephaven server
        run: |
          cd server
          python -c "
          exec(open('app.py').read())
          import time
          while True:
              time.sleep(60)
          " &
          echo "Waiting for Deephaven server on port 10000..."
          for i in $(seq 1 30); do
            if python -c "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost',10000)); s.close()" 2>/dev/null; then
              echo "Deephaven server is ready!"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Run tests
        run: pytest tests/ -x -q

  build:
    name: Build package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
